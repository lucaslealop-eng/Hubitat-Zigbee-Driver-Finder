name: Update Zigbee Database

on:
  schedule:
    # Roda toda segunda-feira à 01:00 UTC
    - cron: '0 1 * * 1'
  workflow_dispatch: # Permite rodar o workflow manualmente pela interface do GitHub

permissions:
  contents: write # Necessário para o bot fazer o commit

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Scraper
      run: npm run scrape

    - name: Commit Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update: Banco de dados HPM sincronizado"
        file_pattern: "data/db_hpm_scraped.json"
        commit_user_name: "github-actions[bot]"
        commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
