name: Update Device Database

on:
  schedule:
    # Runs every Monday at 01:00 UTC.
    - cron: '0 1 * * 1'
  workflow_dispatch: # Allows manual execution from GitHub.

permissions:
  contents: write # Required for the bot commit.

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Main Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Run Scraper
      run: npm run scrape

    - name: Import Company Sheet
      run: npm run import-company-sheet

    - name: Import Public Sources
      run: npm run import-public-sources

    - name: Update Database Index
      run: npm run update-index

    - name: Validate Database
      run: npm run validate-db

    - name: Sync to Data Repository
      env:
        DATA_REPO_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
      run: |
        # Clone the data repo
        git clone https://x-access-token:${DATA_REPO_TOKEN}@github.com/lucaslealop-eng/Hubitat-Driver-Finder-Data.git /tmp/data-repo

        # Copy updated data files
        cp data/*.json /tmp/data-repo/

        # Commit and push if there are changes
        cd /tmp/data-repo
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-update: bancos HPM e fontes publicas sincronizados"
          git push
          echo "Data repo updated successfully"
        fi

    - name: Commit Local Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-update: bancos HPM e planilha da empresa sincronizados"
        file_pattern: "data/db_hpm_scraped.json data/db_zwave_hpm_scraped.json data/db_company_devices.json data/db_zigbee2mqtt_devices.json data/db_zwavejs_devices.json data/zigbee_driver_db.json"
        commit_user_name: "github-actions[bot]"
        commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
        commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
